<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adapt Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="brand">
                <a href="index.html" class="brand-link">
                    <i class="fas fa-hand-heart"></i>
                    <img src="adapt.ico" class="adapt-logo">Adapt
                </a>
            </div>
        
            <div class="nav-menu" id="nav-menu">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="events.html" class="nav-link">Events</a>
                    <a href="index.html#about" class="nav-link">About</a>
                    <a href="index.html#committees" class="nav-link">Committees</a>
                    <a href="index.html#contact" class="nav-link">Contact</a>
                    <a href="login.html" class="nav-link active">Join Us</a>
                </div>

                <div class="user-section" id="user-section"></div>
            </div>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>
    <div class="main">
        <div class="container">
            <div class="wrapper login-form">
                <h1 class="form-title">Login</h1>

                <form id="Login form" onsubmit="Login()">
                    <div class="inputs">
                        <label for="log-username">Username</label>
                        <input type="text" id="log-username" name="username" placeholder="enter your username" required>
                    </div>
                    <div class="inputs">
                        <label for="log-password">Password</label>
                        <input type="password" id="log-password" name="password" placeholder="enter your password" required>
                    </div>
                    <button type="button" class="submit-btn" onclick="Login()">Log in</button>
                </form>

                <p class="register">
                    Don`t have an account?
                    <a href="register.html">Sign up</a>
                </p>
                <div id="msg" class="msg">

                </div>

            </div>
        </div>
    </div>
    <script src="login.js"></script>
    
</body>
</html>
