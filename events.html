            <p class="sub">Learn more about Adapt events</p>
        </header>
        <section class="search-section">
            <div class="container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" id="search" placeholder="Search for events">
                </div>
            </div>

            <div class="filter-bar">
                <div class="filter-group">
                    <label for="location-filter">
                        Location:
                    </label>
                    <select id="location-filter" class="location-filter">
                        
                    </select>
                </div>
                <div class="filter-group">
                    <label for="date-filter">
                        date:
                    </label>
                    <select id="date-filter" class="date-filter">
                        
                    </select>
                </div>
                <div class="filter-group">
                    <label for="tag-filter">
                        Tags:
                    </label>
                    <select id="tag-filter" class="tag-filter">
                        
                    </select>
                </div>
                <button class="filter-btn" onclick="ApplyFilters()">
                    <i class="fas fa-filter"></i> Apply filters
                </button>
            </div>
        </section>
        <div>
            <div id="events" class="events-grid">
                <div class="loading">Loading events...</div>
            </div>
        </div>
    </div>
    <script src="events.js"></script>
</body>
</html>
