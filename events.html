<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adapt Events</title>
    <link rel="stylesheet" href="events.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="brand">
                <a href="index.html" class="brand-link">
                    <i class="fas fa-hand-heart"></i>
                    <img src="adapt.ico" class="adapt-logo">Adapt
                </a>
            </div>
        
            <div class="nav-menu" id="nav-menu">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="events.html" class="nav-link active">Events</a>
                    <a href="index.html#about" class="nav-link">About</a>
                    <a href="index.html#committees" class="nav-link">Committees</a>
                    <a href="index.html#contact" class="nav-link">Contact</a>
                    <a href="login.html" class="nav-link">Login</a>
                </div>

                <div class="user-section" id="user-section"></div>
            </div>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>
    <div class="main">
        <header>
            Adapt events
            <p class="sub">Learn more about Adapt events</p>
        </header>
        <section class="search-section">
            <div class="container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" id="search" placeholder="Search for events">
                </div>
            </div>

            <div class="filter-bar">
                <div class="filter-group">
                    <label for="location-filter">
                        Location:
                    </label>
                    <select id="location-filter" class="location-filter">
                        
                    </select>
                </div>
                <div class="filter-group">
                    <label for="date-filter">
                        date:
                    </label>
                    <select id="date-filter" class="date-filter">
                        
                    </select>
                </div>
                <div class="filter-group">
                    <label for="tag-filter">
                        Tags:
                    </label>
                    <select id="tag-filter" class="tag-filter">
                        
                    </select>
                </div>
                <button class="filter-btn" onclick="ApplyFilters()">
                    <i class="fas fa-filter"></i> Apply filters
                </button>
            </div>
        </section>
        <div>
            <div id="events" class="events-grid">
                <div class="loading">Loading events...</div>
            </div>
        </div>
    </div>
    <script src="events.js"></script>
</body>
</html>
