<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adapt Sign up</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="main">
        <div class="container">
            <div class="wrapper register-form">
                <h1 class="form-title">Sign up</h1>

                <form id="Register form">
                    <div class="inputs">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" name="username" placeholder="enter username here" required>
                    </div>
                    <div class="inputs">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" name="email" placeholder="enter Email here" required>
                    </div>
                    <div class="inputs">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" name="password" placeholder="enter Password here" required>
                    </div>
                    <div class="inputs">
                        <label for="reg-repassword">Confirm Password</label>
                        <input type="password" id="reg-repassword" name="repassword" placeholder="Confirm Password here" required>
                    </div>
                    <button type="button" class="submit-btn" onclick="Register()">Sign up</button>
                </form>
                <p class="register">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>
            </div>
            <div class="msg" id="msg"></div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
